# docker-compose.yml for Bradicoin Mainnet RPC
# Easy deployment with automatic restart and volume persistence

version: '3.8'

services:
  bradicoin-rpc:
    build: .
    container_name: bradicoin-mainnet-rpc
    restart: unless-stopped
    ports:
      - "8545:8545"
    environment:
      - NODE_ENV=production
      - RPC_PORT=8545
      - RPC_HOST=0.0.0.0
    volumes:
      # Persist blockchain data
      - bradicoin-data:/app/bradicoin-data
    networks:
      - bradicoin-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8545/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Optional: Add monitoring service
  bradicoin-monitor:
    image: grafana/grafana:latest
    container_name: bradicoin-monitor
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=bradicoin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - bradicoin-network
    depends_on:
      - bradicoin-rpc
    profiles:
      - monitoring

volumes:
  bradicoin-data:
    driver: local
  grafana-data:
    driver: local

networks:
  bradicoin-network:
    driver: bridge
